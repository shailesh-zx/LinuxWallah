<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Auth Portal</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --error: #dc2626;
            --success: #16a34a;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .hidden { display: none !important; }
        .tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e5e7eb;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 0.5rem;
            cursor: pointer;
            font-weight: bold;
            color: #6b7280;
        }
        .tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            margin-bottom: -2px;
        }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.25rem; font-size: 0.875rem; }
        input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover { background-color: #1d4ed8; }
        .social-auth {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .btn-social {
            flex: 1;
            background-color: #fff;
            color: #374151;
            border: 1px solid #d1d5db;
        }
        .btn-social:hover { background-color: #f9fafb; }
        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: #6b7280;
            font-size: 0.875rem;
            position: relative;
        }
        .message {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.875rem;
        }
        .error { color: var(--error); }
        .success { color: var(--success); }
    </style>
</head>
<body>

<div class="container" id="auth-container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')" id="tab-login">Login</div>
        <div class="tab" onclick="switchTab('signup')" id="tab-signup">Sign Up</div>
    </div>

    <!-- Login Form -->
    <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" required>
        </div>
        <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" required>
        </div>
        <button type="submit">Log In</button>
    </form>

    <!-- Signup Form -->
    <form id="signup-form" class="hidden" onsubmit="handleSignup(event)">
        <div class="form-group">
            <label for="signup-email">Email Address</label>
            <input type="email" id="signup-email" required>
        </div>
        <div class="form-group">
            <label for="signup-password">Password (Min 8 chars)</label>
            <input type="password" id="signup-password" minlength="8" required>
        </div>
        <div class="form-group">
            <label for="signup-confirm">Confirm Password</label>
            <input type="password" id="signup-confirm" required>
        </div>
        <button type="submit">Create Account</button>
    </form>

    <div class="divider">OR</div>

    <!-- Social OAuth Buttons -->
    <div class="social-auth">
        <button class="btn-social" onclick="triggerOAuth('google')">Google</button>
        <button class="btn-social" onclick="triggerOAuth('github')">GitHub</button>
    </div>

    <div id="auth-message" class="message"></div>
</div>

<!-- Logged In Dashboard -->
<div class="container hidden" id="dashboard-container">
    <h2>Welcome to your Dashboard!</h2>
    <p>You have successfully authenticated.</p>
    <button onclick="handleLogout()" style="background-color: var(--error);">Log Out</button>
</div>

<script>
    // --- CONFIGURATION ---
    // Replace this with your actual Cloudflare Worker URL
    const API_BASE_URL = 'https://linuxwallah-auth.shailesh-github.workers.dev';

    // --- UI LOGIC ---
    function switchTab(tab) {
        document.getElementById('auth-message').textContent = '';
        if (tab === 'login') {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('tab-login').classList.add('active');
            document.getElementById('tab-signup').classList.remove('active');
        } else {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.remove('hidden');
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('tab-signup').classList.add('active');
        }
    }

    function showMessage(text, isError = false) {
        const msgEl = document.getElementById('auth-message');
        msgEl.textContent = text;
        msgEl.className = 'message ' + (isError ? 'error' : 'success');
    }

    function toggleDashboard(show) {
        if (show) {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('dashboard-container').classList.remove('hidden');
        } else {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('dashboard-container').classList.add('hidden');
        }
    }

    // --- AUTHENTICATION LOGIC ---

    async function handleLogin(event) {
        event.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        try {
            // Note: Update '/api/login' to match your Worker's actual route
            const response = await fetch(`${API_BASE_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Assuming your backend sets an HttpOnly cookie, we just redirect or show UI
                showMessage('Login successful!', false);
                toggleDashboard(true);
            } else {
                showMessage(data.error || 'Invalid credentials.', true);
            }
        } catch (err) {
            showMessage('Network error connecting to the server.', true);
        }
    }

    async function handleSignup(event) {
        event.preventDefault();
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-password').value;
        const confirm = document.getElementById('signup-confirm').value;

        // Frontend validation
        if (password !== confirm) {
            showMessage('Passwords do not match.', true);
            return;
        }

        // Basic check to discourage disposable emails (you can expand this array)
        const disposableDomains = ['tempmail.com', '10minutemail.com'];
        const emailDomain = email.split('@')[1];
        if (disposableDomains.includes(emailDomain)) {
            showMessage('Temporary or fake emails are not allowed.', true);
            return;
        }

        try {
            // Note: Update '/api/signup' to match your Worker's actual route
            const response = await fetch(`${API_BASE_URL}/api/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                showMessage('Account created successfully! You can now log in.', false);
                switchTab('login');
                document.getElementById('signup-form').reset();
            } else {
                showMessage(data.error || 'Registration failed.', true);
            }
        } catch (err) {
            showMessage('Network error connecting to the server.', true);
        }
    }

    function triggerOAuth(provider) {
        // Redirects the browser directly to the Worker's OAuth authorization route
        // Google: /auth/google | GitHub: /auth/github
        window.location.href = `${API_BASE_URL}/auth/${provider}`;
    }

    async function handleLogout() {
        try {
            // Tell the backend to clear the session/cookie
            await fetch(`${API_BASE_URL}/api/logout`, { method: 'POST' });
        } catch (e) {
            console.error(e);
        } finally {
            toggleDashboard(false);
            document.getElementById('login-form').reset();
            switchTab('login');
        }
    }
</script>
</body>
</html>
