<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - LinuxWallah</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(to bottom, #050505 50%, #9da3d1 50%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: #ffffff; width: 100%; max-width: 400px; padding: 40px 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); }
        .form-title { text-align: center; font-size: 24px; font-weight: 600; color: #111; margin-bottom: 25px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group input { width: 100%; padding: 12px 15px; margin-bottom: 15px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; outline: none; }
        .form-group input:focus { border-color: #0860bb; }
        
        /* 🔥 NEW CSS FOR PASSWORD EYE ICON */
        .password-wrapper { position: relative; width: 100%; margin-bottom: 15px; }
        .password-wrapper input { margin-bottom: 0; padding-right: 40px; } /* Box ke andar right side space */
        .toggle-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #9ca3af; font-size: 16px; transition: color 0.3s; }
        .toggle-icon:hover { color: #0860bb; }

        .submit-btn { width: 100%; padding: 12px; background: #00448a; color: #ffffff; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="form-title">Create New Password</h2>
        <form class="form-group" id="reset-form">
            
            <div class="password-wrapper">
                <input type="password" id="new-password" placeholder="New Password" required>
                <i class="fa-solid fa-eye-slash toggle-icon" onclick="togglePasswordVisibility('new-password', this)"></i>
            </div>
            
            <div class="password-wrapper">
                <input type="password" id="confirm-password" placeholder="Confirm New Password" required>
                <i class="fa-solid fa-eye-slash toggle-icon" onclick="togglePasswordVisibility('confirm-password', this)"></i>
            </div>

            <button type="submit" class="submit-btn">Update Password</button>
        </form>
    </div>

    <script>
        // 🔥 NAYA FUNCTION: Eye Icon ko Toggle karne ke liye
        function togglePasswordVisibility(inputId, icon) {
            const inputField = document.getElementById(inputId);
            if (inputField.type === "password") {
                inputField.type = "text";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
                icon.style.color = "#0860bb"; // Show hone par blue color
            } else {
                inputField.type = "password";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
                icon.style.color = "#9ca3af"; // Wapas grey color
            }
        }

        const WORKER_URL = "https://linuxwallah-auth.shailesh-github.workers.dev";
        
        // URL se token nikalne ke liye
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        // Security Check: Agar token nahi hai toh alert dekar home page par bhej do
        if (!token) {
            alert("Token missing or invalid! Please check your email link again.");
            window.location.href = "/"; 
        }

        document.getElementById('reset-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const password = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            try {
                // Token aur naya password backend par bhejo
                const response = await fetch(`${WORKER_URL}/reset-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, password })
                });
                
                const data = await response.json();

                if (response.ok) {
                    alert("Password updated successfully! You can now login.");
                    window.location.href = "/"; // Success ke baad login/home par bhej do
                } else {
                    alert("Error: " + data.error);
                }
            } catch (error) {
                alert("Could not connect to the server. Please try again.");
                console.error(error);
            }
        });
    </script>
</body>
</html>
